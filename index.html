<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekap Absensi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-6xl mx-auto mb-8 text-center md:text-left flex flex-col md:flex-row items-center justify-between">
        <div>
            <h1 class="text-3xl font-bold text-indigo-900 flex items-center justify-center md:justify-start gap-3">
                <i data-lucide="file-check" class="w-8 h-8 text-indigo-600"></i>
                Sistem Rekap Absensi
            </h1>
            <p class="text-slate-500 mt-2">Catat kehadiran harian dengan bukti foto.</p>
        </div>
        <div class="mt-4 md:mt-0 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200 flex items-center gap-2">
            <i data-lucide="clock" class="w-5 h-5 text-indigo-500"></i>
            <span id="current-date-display" class="font-medium"></span>
        </div>
    </header>

    <!-- Notifikasi Toast -->
    <div id="notification-toast" class="fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all transform duration-300 translate-y-[-100%] opacity-0">
        <i id="notification-icon" data-lucide="check-circle" class="w-5 h-5 text-white"></i>
        <p id="notification-message" class="font-medium text-white"></p>
    </div>

    <!-- Image Modal (Pop-up Foto) -->
    <div id="image-modal" class="fixed inset-0 z-[60] bg-black/80 hidden flex-col items-center justify-center p-4 transition-opacity backdrop-blur-sm">
        <button onclick="closeModal()" class="absolute top-4 right-4 md:top-8 md:right-8 p-2 text-white/70 hover:text-white bg-black/50 hover:bg-black/80 rounded-full transition-all">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <img id="modal-image" src="" alt="Foto Absen Lebar" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl object-contain" />
        <p class="text-white/80 mt-4 font-medium text-sm">Klik di luar gambar untuk menutup</p>
    </div>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Kolom Kiri: Form Input -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-xl font-bold text-slate-800 mb-6 border-b pb-4 flex items-center gap-2">
                    <i data-lucide="user" class="w-5 h-5 text-indigo-500"></i>
                    Form Absensi
                </h2>

                <form id="attendance-form" class="space-y-5">
                    
                    <!-- Input Nama -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                        <input 
                            type="text" 
                            id="input-name"
                            placeholder="Masukkan nama Anda..."
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                        />
                    </div>

                    <!-- Input Tanggal & Waktu -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal</label>
                            <input 
                                type="date" 
                                id="input-date"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all appearance-none"
                            />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Waktu</label>
                            <input 
                                type="time" 
                                id="input-time"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all appearance-none"
                            />
                        </div>
                    </div>

                    <!-- Input Status -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Status Kehadiran</label>
                        <select 
                            id="input-status"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white"
                        >
                            <option value="Masuk">Masuk</option>
                            <option value="Pulang">Pulang</option>
                        </select>
                    </div>

                    <!-- Upload Foto -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Bukti Foto / Selfie</label>
                        
                        <div id="photo-placeholder" onclick="document.getElementById('file-input').click()" class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer hover:bg-slate-50 hover:border-indigo-400 transition-all group">
                            <div class="space-y-2 text-center">
                                <div class="flex justify-center gap-3">
                                    <div class="p-3 bg-indigo-50 rounded-full text-indigo-600 group-hover:bg-indigo-100 transition-colors">
                                        <i data-lucide="camera" class="w-6 h-6"></i>
                                    </div>
                                    <div class="p-3 bg-indigo-50 rounded-full text-indigo-600 group-hover:bg-indigo-100 transition-colors">
                                        <i data-lucide="image" class="w-6 h-6"></i>
                                    </div>
                                </div>
                                <div class="text-sm text-slate-600 flex flex-col">
                                    <span class="font-semibold text-indigo-600">Klik untuk upload foto</span>
                                    <span class="text-xs mt-1">Bisa ambil dari kamera atau galeri</span>
                                </div>
                            </div>
                        </div>

                        <div id="photo-preview" class="hidden relative mt-2 rounded-xl overflow-hidden border border-slate-200 bg-slate-50">
                            <img id="preview-img" src="" alt="Preview" class="w-full h-48 object-cover cursor-pointer" onclick="openModal(this.src)" title="Klik untuk perbesar" />
                            <button type="button" onclick="removePhoto()" class="absolute top-2 right-2 p-1.5 bg-white/90 backdrop-blur-sm text-red-600 rounded-full shadow-sm hover:bg-red-50 transition-colors" title="Hapus Foto">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-3 pointer-events-none">
                                <p class="text-white text-xs font-medium truncate">Foto siap diupload</p>
                            </div>
                        </div>
                        
                        <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload(event)" />
                    </div>

                    <button type="submit" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-sm hover:shadow transition-all flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-5 h-5"></i>
                        Simpan Absen
                    </button>
                </form>
            </div>
        </div>

        <!-- Kolom Ranan: Rekap Data -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
                <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-5 h-5 text-indigo-500"></i>
                        Data Rekap Absensi
                    </h2>
                    
                    <div class="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                        <select id="filter-select" onchange="handleFilterChange(event)" class="text-sm px-3 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer shadow-sm">
                            <option value="all">Semua Waktu</option>
                            <option value="daily">Hari Ini</option>
                            <option value="weekly">Minggu Ini</option>
                            <option value="monthly">Bulan Ini</option>
                        </select>

                        <div id="records-count" class="text-sm px-3 py-2 bg-slate-100 border border-slate-200 rounded-lg text-slate-600 font-medium">
                            Total: 0
                        </div>
                        <button onclick="exportToCSV()" class="flex items-center gap-1.5 text-sm px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors font-medium shadow-sm">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            <span class="hidden sm:inline">Export CSV</span>
                        </button>
                    </div>
                </div>

                <div class="p-6 flex-1 overflow-auto bg-slate-50/30 min-h-[400px]">
                    <div id="records-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-slate-400 space-y-3 py-12">
                        <i data-lucide="file-check" class="w-16 h-16 opacity-20"></i>
                        <p id="empty-text">Belum ada data absensi.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        lucide.createIcons();

        // --- URL WEB APP GOOGLE APPS SCRIPT BARU ---
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw39WbmXkcrNEb61quIvSopo2AjzJIhqIOkR7cQ4n_nSU8UGqj8_mjyFdk-7AOsBa64/exec';

        let records = [];
        let currentPhotoData = null;
        let currentFilter = 'all';

        // Load data dari Local Storage
        const savedData = localStorage.getItem('absensi_records');
        if (savedData) {
            records = JSON.parse(savedData);
        }
        renderRecords();

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notification-toast');
            const msgEl = document.getElementById('notification-message');
            const iconEl = document.getElementById('notification-icon');
            msgEl.textContent = message;
            
            if (type === 'success') {
                toast.className = 'fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all transform duration-300 translate-y-0 opacity-100 bg-emerald-600 text-white';
                iconEl.setAttribute('data-lucide', 'check-circle');
            } else {
                toast.className = 'fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all transform duration-300 translate-y-0 opacity-100 bg-red-500 text-white';
                iconEl.setAttribute('data-lucide', 'alert-circle');
            }
            lucide.createIcons();
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-100%]', 'opacity-0');
            }, 3500);
        }

        function setDateTimeDefaults() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('input-date').value = `${yyyy}-${mm}-${dd}`;
            document.getElementById('input-time').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('current-date-display').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setDateTimeDefaults();

        window.openModal = (src) => {
            document.getElementById('modal-image').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
            document.body.style.overflow = 'auto';
        };

        window.handlePhotoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        currentPhotoData = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('preview-img').src = currentPhotoData;
                        document.getElementById('photo-placeholder').classList.add('hidden');
                        document.getElementById('photo-preview').classList.remove('hidden');
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        window.removePhoto = () => {
            currentPhotoData = null;
            document.getElementById('file-input').value = '';
            document.getElementById('photo-placeholder').classList.remove('hidden');
            document.getElementById('photo-preview').classList.add('hidden');
        };

        window.handleDelete = (id) => {
            if (confirm('Hapus histori ini?')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('absensi_records', JSON.stringify(records));
                renderRecords();
            }
        };

        window.handleFilterChange = (e) => {
            currentFilter = e.target.value;
            renderRecords();
        };

        function renderRecords() {
            const container = document.getElementById('records-container');
            const filtered = records.filter(r => {
                if (currentFilter === 'all') return true;
                const d = new Date(r.date);
                const today = new Date();
                today.setHours(0,0,0,0);
                d.setHours(0,0,0,0);
                if (currentFilter === 'daily') return d.getTime() === today.getTime();
                if (currentFilter === 'monthly') return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
                return true;
            });

            document.getElementById('records-count').textContent = `Total: ${filtered.length}`;
            if (filtered.length === 0) {
                container.innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                container.innerHTML = filtered.map(r => `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md relative group">
                        <div class="flex gap-4">
                            <img src="${r.photo}" onclick="openModal(this.src)" class="w-16 h-16 rounded-lg object-cover cursor-pointer" />
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-800 truncate">${r.name}</h3>
                                <p class="text-xs text-slate-500 mt-1">${r.date} | ${r.time}</p>
                                <span class="inline-block mt-2 px-2 py-0.5 rounded-full text-xs font-semibold ${r.status === 'Masuk' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}">
                                    ${r.status}
                                </span>
                            </div>
                        </div>
                        <button onclick="handleDelete(${r.id})" class="absolute top-2 right-2 p-1 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        document.getElementById('attendance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('input-name').value.trim();
            const date = document.getElementById('input-date').value;
            const time = document.getElementById('input-time').value;
            const status = document.getElementById('input-status').value;
            const btn = e.target.querySelector('button[type="submit"]');

            if (!name || !currentPhotoData) return showNotification('Lengkapi data dan foto!', 'error');

            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Menyimpan...';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const params = new URLSearchParams();
                params.append('nama', name);
                params.append('tanggal', date);
                params.append('waktu', time);
                params.append('status', status);
                params.append('photoBase64', currentPhotoData.split(',')[1]);
                params.append('mimeType', 'image/jpeg');

                // Mengirim ke Apps Script
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: params
                });

                const newRec = { id: Date.now(), name, date, time, status, photo: currentPhotoData };
                records.unshift(newRec);
                localStorage.setItem('absensi_records', JSON.stringify(records));
                renderRecords();
                
                showNotification('Berhasil disimpan ke Google Sheet!', 'success');
                document.getElementById('input-name').value = '';
                removePhoto();
                setDateTimeDefaults();
            } catch (err) {
                console.error(err);
                showNotification('Gagal terhubung ke server, data tetap disimpan di HP.', 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        window.exportToCSV = () => {
            const rows = [["Nama Lengkap", "Tanggal", "Waktu", "Status"]];
            records.forEach(r => rows.push([r.name, r.date, r.time, r.status]));
            const csv = rows.map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rekap_absensi_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        };
    </script>
</body>
</html>
